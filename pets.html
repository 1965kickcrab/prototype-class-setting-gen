<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>내 반려견</title>
    <link rel="stylesheet" href="src/styles/app.css" />
  </head>
  <body>
    <main class="pet-home app-screen" aria-labelledby="pet-home-title">
      <header class="pet-home__header app-header">
        <button class="pet-home__close app-header__button" type="button" data-action="go-back" aria-label="더보기로 돌아가기">×</button>
        <h1 class="pet-home__title app-header__title" id="pet-home-title">내 반려견</h1>
        <span aria-hidden="true"></span>
      </header>

      <div class="pet-home__content">
        <p class="pet-home__description">유치원 등록에 필요한<br />반려견 프로필을 등록하고 관리할 수 있습니다.</p>
        <button class="pet-registration-button" type="button" data-action="register-pet">
          <span class="pet-registration-button__icon" aria-hidden="true">+</span>
          <span>반려견 등록</span>
        </button>

        <section class="pet-home__list-section" aria-labelledby="pet-list-title">
          <h2 class="visually-hidden" id="pet-list-title">등록된 반려견</h2>
          <div class="pet-list" data-field="pet-list"></div>
          <p class="pet-home__empty empty-state" data-field="empty-message" hidden>등록된 반려견이 없습니다.</p>
        </section>
      </div>
    </main>

    <script type="module" src="src/pet-main.js"></script>
  </body>
</html>
